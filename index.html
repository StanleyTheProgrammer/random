<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KNOTMOS | Quantum Knot Weaver</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #030518, #010108);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Space Mono', 'Orbitron', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            background: rgba(5, 12, 28, 0.65);
            backdrop-filter: blur(6px);
            border-radius: 56px;
            padding: 20px 24px 28px 24px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(80, 180, 255, 0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.3), 0 20px 35px rgba(0,0,0,0.5);
            cursor: pointer;
            background: #01040f;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-top: 20px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .stat {
            background: #050e1acc;
            border-radius: 60px;
            padding: 6px 20px;
            backdrop-filter: blur(4px);
            border: 1px solid #2cc9ff;
            box-shadow: 0 0 8px rgba(0,255,210,0.3);
            font-weight: bold;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .stat-label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #9eeeff;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            color: #ffda88;
            font-family: monospace;
            line-height: 1;
        }

        .message-panel {
            background: #030c1cee;
            border-radius: 40px;
            padding: 6px 20px;
            flex: 1;
            text-align: center;
            color: #bbf5ff;
            font-size: 0.85rem;
            font-family: monospace;
            border-left: 3px solid cyan;
            border-right: 3px solid cyan;
        }

        button {
            background: #0f1a2c;
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 40px;
            color: #caf0ff;
            cursor: pointer;
            transition: 0.1s linear;
            font-size: 0.9rem;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px black;
            border-bottom: 2px solid #2d7a9e;
        }

        button:active {
            transform: scale(0.96);
        }

        .flex-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 0.7rem;
            color: #427a9b;
        }

        @media (max-width: 700px) {
            .game-wrapper {
                padding: 12px;
            }
            .stat-value {
                font-size: 1.4rem;
            }
            .message-panel {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="knotCanvas" width="780" height="640"></canvas>
        
        <div class="info-bar">
            <div class="stat">
                <span class="stat-label">✦ KNOTS ✦</span>
                <span class="stat-value" id="knotScore">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">🌀 ENTANGLEMENT</span>
                <span class="stat-value" id="entanglementMeter">0</span>
            </div>
            <div class="message-panel" id="gameMsg">
                ⚡ CONNECT NODES → UNRAVEL KNOTS
            </div>
        </div>
        <div class="flex-buttons">
            <button id="resetKnot">⟳ REWEAVE</button>
            <button id="helpKnot">⨀ LORE</button>
        </div>
        <div class="footer">
            ✦ KNOTMOS: unique tangle puzzle — drag between nodes to form THREADS. Clear resonance loops!
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- UNIQUE GAME "KNOTMOS" - NEVER SEEN BEFORE ----------
        // CONCEPT: a board of quantum nodes. Each node has a color & phase.
        // Player draws "threads" (edges) between nodes. When a closed loop (cycle) is formed
        // with alternating phase harmony? But the twist: threads have "twist value" based on angle.
        // The goal: create "KNOT RESONANCE" – every time you form a SIMPLE CYCLE that sums to zero
        // using special node energies, the cycle collapses into points and gives score.
        // BUT there's an ENTANGLEMENT METER: each existing thread adds "tension". If entanglement reaches max,
        // nodes start shifting & you lose meter if you don't clear knots.
        // Additionally, you cannot cross existing threads, and each node has limited connection slots.
        // The CORE unique mechanic: "Quantum braiding" — threads can be upgraded to "twisted threads"
        // by clicking on an existing connection (removing it) BUT if you reconnect same nodes after 2 sec? no.
        // Instead: special "phase inversion": when 3 threads meet at a node, you can tap node to perform "KNOT UNTANGLE"
        // which clears smallest cycle. It's original: drag-to-draw, no game like this exists.
        // ALSO: there are special WILDCARD NODES (void cores) that spawn randomly, they act as universal adapters.
        // The game is entirely vector-graphics based and original.
        // ------------------------------------------------------------------

        const canvas = document.getElementById('knotCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width = 780;
        const h = canvas.height = 640;

        // Node system
        let nodes = [];
        let edges = [];      // each edge: {from, to, twisted, lifeForce}
        let selectedNode = null;
        let dragActive = false;
        let mouseX = 0, mouseY = 0;
        
        let knotScore = 0;
        let entanglement = 0;
        let maxEntanglement = 28;
        let gameActive = true;
        
        // messages
        let msgText = "✨ Drag between NODES to spin a THREAD. Create LOOPS → clear knots! ✨";
        let msgTimer = 0;
        
        // unique: wildcard nodes spawn chance
        let wildcardPresent = false;
        
        const NODE_RADIUS = 24;
        const MAX_CONNECTIONS = 4;   // max edges per node
        const ENTANGLE_DECAY_RATE = 0.12;   // per second (updated by frame)
        const ENTANGLE_GAIN_PER_EDGE = 0.45;
        
        // predefine nodes: 12 nodes in a organic circular / mesh layout (unique distribution)
        function initNodes() {
            const positions = [
                {x: 150, y: 130}, {x: 380, y: 100}, {x: 600, y: 140},
                {x: 80, y: 320}, {x: 270, y: 280}, {x: 500, y: 300}, {x: 700, y: 310},
                {x: 160, y: 500}, {x: 390, y: 480}, {x: 620, y: 520},
                {x: 70, y: 580}, {x: 710, y: 570}
            ];
            nodes = [];
            for (let i=0; i<positions.length; i++) {
                let special = false;
                // assign random phase value (float -1..1) and color twist
                let phase = Math.sin(i * 97.3) * 0.8 + Math.random() * 0.5;
                let hue = (i * 47) % 360;
                nodes.push({
                    id: i,
                    x: positions[i].x,
                    y: positions[i].y,
                    phase: phase,
                    hue: hue,
                    connections: [],
                    isWildcard: (Math.random() < 0.18 && i > 1) ? true : false,
                    pulse: 0
                });
            }
            // ensure at least one wildcard
            if (!nodes.some(n => n.isWildcard)) nodes[3].isWildcard = true;
            edges = [];
            entanglement = 0;
            knotScore = 0;
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('knotScore').innerText = knotScore;
            let entVal = Math.floor(entanglement * 10) / 10;
            document.getElementById('entanglementMeter').innerText = entVal + "/" + maxEntanglement;
        }
        
        function setMessage(txt, durationFrames = 100) {
            msgText = txt;
            msgTimer = durationFrames;
        }
        
        function updateMessage() {
            if (msgTimer > 0) {
                msgTimer--;
                if(msgTimer === 0) msgText = "✧ Draw threads between nodes. Close a LOOP to gain KNOT points! ✧";
            }
            document.getElementById('gameMsg').innerText = msgText;
        }
        
        // helper: check if edge already exists
        function edgeExists(a,b) {
            return edges.some(e => (e.from === a && e.to === b) || (e.from === b && e.to === a));
        }
        
        // update node connection list
        function rebuildNodeConnections() {
            nodes.forEach(n => n.connections = []);
            edges.forEach(edge => {
                nodes[edge.from].connections.push(edge.to);
                nodes[edge.to].connections.push(edge.from);
            });
        }
        
        // add edge & update entanglement & check cycles
        function addEdge(fromIdx, toIdx) {
            if (!gameActive) return false;
            if (fromIdx === toIdx) return false;
            if (edgeExists(fromIdx, toIdx)) return false;
            let fromNode = nodes[fromIdx];
            let toNode = nodes[toIdx];
            if (fromNode.connections.length >= MAX_CONNECTIONS || toNode.connections.length >= MAX_CONNECTIONS) {
                setMessage("⛓️ NODE OVERLOAD! Max 4 threads per node. ⛓️", 60);
                return false;
            }
            // unique twist: compute quantum twist factor based on phases & angle
            const dx = toNode.x - fromNode.x;
            const dy = toNode.y - fromNode.y;
            const angle = Math.atan2(dy, dx);
            const twistValue = Math.sin(angle * 2 + fromNode.phase * Math.PI) * 0.5;
            edges.push({
                from: fromIdx,
                to: toIdx,
                twist: twistValue,
                age: 0
            });
            rebuildNodeConnections();
            // increase entanglement
            entanglement = Math.min(maxEntanglement, entanglement + ENTANGLE_GAIN_PER_EDGE);
            updateUI();
            // after adding edge, check for cycles (unique knot detection)
            let cycles = findAllSimpleCycles();
            if (cycles.length > 0) {
                // find smallest cycle to clear (most elegant)
                let smallestCycle = cycles.reduce((a,b) => a.length < b.length ? a : b);
                clearCycle(smallestCycle);
                return true;
            }
            // check entanglement threshold
            if (entanglement >= maxEntanglement) {
                gameActive = false;
                setMessage("💢 ENTANGLEMENT COLLAPSE! Game Over. Press REWEAVE 💢", 200);
                updateUI();
            }
            return true;
        }
        
        // Find all elementary cycles (brute-force but limited nodes 12, edges <= 24)
        function findAllSimpleCycles() {
            let cycles = [];
            let visitedEdges = new Set();
            // DFS to find cycles up to length 7
            function dfs(node, start, path, cameFrom) {
                if (path.length > 7) return;
                for (let neighbor of nodes[node].connections) {
                    if (neighbor === cameFrom) continue;
                    if (neighbor === start && path.length >= 3) {
                        // cycle detected
                        let cycleNodes = [start, ...path];
                        cycles.push(cycleNodes);
                        continue;
                    }
                    if (!path.includes(neighbor)) {
                        dfs(neighbor, start, [...path, neighbor], node);
                    }
                }
            }
            for (let i=0; i<nodes.length; i++) {
                dfs(i, i, [], -1);
            }
            // remove duplicate cycles (by sorted set)
            let uniqueCycles = [];
            let keys = new Set();
            for (let cycle of cycles) {
                let sortedKey = [...cycle].sort((a,b)=>a-b).join(',');
                if (!keys.has(sortedKey)) {
                    keys.add(sortedKey);
                    uniqueCycles.push(cycle);
                }
            }
            return uniqueCycles;
        }
        
        // clear a cycle: remove edges that form that exact cycle, increase score, reduce entanglement
        function clearCycle(cycleNodes) {
            // convert cycle nodes to edges list (pairwise)
            let edgesToRemove = [];
            for (let i=0; i<cycleNodes.length; i++) {
                let a = cycleNodes[i];
                let b = cycleNodes[(i+1) % cycleNodes.length];
                let edgeIdx = edges.findIndex(e => (e.from === a && e.to === b) || (e.from === b && e.to === a));
                if (edgeIdx !== -1) edgesToRemove.push(edgeIdx);
            }
            // remove unique edges
            for (let i=edgesToRemove.length-1; i>=0; i--) {
                let idx = edgesToRemove[i];
                if (idx !== -1) edges.splice(idx,1);
            }
            rebuildNodeConnections();
            // score gain: based on cycle length & wildcard multiplier
            let cycleValue = cycleNodes.length * 2;
            knotScore += cycleValue;
            // entanglement reduction: knots loosen tension
            entanglement = Math.max(0, entanglement - cycleValue * 0.6);
            updateUI();
            setMessage(`🌀 KNOT UNRAVELED! +${cycleValue} Resonance. Entanglement ↓ 🌀`, 70);
            // special effect: pulse nodes
            for(let id of cycleNodes) {
                nodes[id].pulse = 12;
            }
            if(entanglement < 0) entanglement = 0;
            if(!gameActive && knotScore>0) gameActive = true; // auto-revive
            return true;
        }
        
        // remove edge (delete thread) - manual twist interaction (click on thread area)
        function removeEdgeByClick(x,y) {
            if (!gameActive) return false;
            const threshold = 12;
            for(let i=0; i<edges.length; i++) {
                let e = edges[i];
                let p1 = nodes[e.from];
                let p2 = nodes[e.to];
                let dist = pointToSegmentDistance(x,y, p1.x,p1.y, p2.x,p2.y);
                if(dist < threshold) {
                    edges.splice(i,1);
                    rebuildNodeConnections();
                    entanglement = Math.max(0, entanglement - 0.9);
                    setMessage(`✂️ Thread snipped! Entanglement reduced.`, 50);
                    updateUI();
                    return true;
                }
            }
            return false;
        }
        
        function pointToSegmentDistance(px,py, x1,y1, x2,y2) {
            const ax = px - x1, ay = py - y1;
            const bx = x2 - x1, by = y2 - y1;
            const dot = ax * bx + ay * by;
            const len2 = bx * bx + by * by;
            if (len2 === 0) return Math.hypot(ax, ay);
            let t = dot / len2;
            t = Math.max(0, Math.min(1, t));
            const projX = x1 + t * bx;
            const projY = y1 + t * by;
            return Math.hypot(px - projX, py - projY);
        }
        
        // special node untangle: if node has degree 3+, perform mini-knot unravel (smallest cycle containing it)
        function nodeUntangle(nodeIdx) {
            if(!gameActive) return false;
            let cycles = findAllSimpleCycles();
            let containingCycles = cycles.filter(cycle => cycle.includes(nodeIdx));
            if(containingCycles.length > 0) {
                let smallest = containingCycles.reduce((a,b) => a.length < b.length ? a : b);
                clearCycle(smallest);
                return true;
            } else {
                setMessage(`⚠️ No closed loop at this node! Create a cycle first. ⚠️`, 50);
                return false;
            }
        }
        
        // auto spawn wildcard events: random phase shift (entropy)
        function entropyShift() {
            if(Math.random()<0.008 && gameActive && nodes.length>0){
                let randNode = nodes[Math.floor(Math.random()*nodes.length)];
                if(!randNode.isWildcard){
                    randNode.phase = (randNode.phase + (Math.random() - 0.5)*0.6);
                    randNode.phase = Math.min(0.99, Math.max(-0.99, randNode.phase));
                    setMessage(`🌊 Quantum phase shift at node ${randNode.id+1}`, 45);
                }
            }
            // entanglement natural decay
            if(gameActive && entanglement > 0.2){
                entanglement = Math.max(0, entanglement - ENTANGLE_DECAY_RATE * 0.025);
                updateUI();
            }
        }
        
        // draw dynamic & unique graphics
        function draw() {
            ctx.clearRect(0,0,w,h);
            // dark quantum field
            let grad = ctx.createLinearGradient(0,0,w,h);
            grad.addColorStop(0,'#020617');
            grad.addColorStop(1,'#03081f');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,w,h);
            
            // draw edges (threads) with glowing twist effect
            for(let edge of edges) {
                let n1 = nodes[edge.from];
                let n2 = nodes[edge.to];
                ctx.beginPath();
                ctx.moveTo(n1.x, n1.y);
                ctx.lineTo(n2.x, n2.y);
                let intensity = 0.5 + Math.sin(Date.now() * 0.003 + edge.twist * 5)*0.3;
                ctx.strokeStyle = `rgba(100, 200, 255, ${0.5+intensity*0.4})`;
                ctx.lineWidth = 4 + Math.abs(edge.twist)*1.8;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#0aefff";
                ctx.stroke();
                // draw weave pattern (unique dash)
                ctx.beginPath();
                ctx.moveTo(n1.x, n1.y);
                ctx.lineTo(n2.x, n2.y);
                ctx.strokeStyle = "#ffffffaa";
                ctx.lineWidth = 1.5;
                ctx.setLineDash([6, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.shadowBlur = 0;
            // draw nodes
            for(let node of nodes) {
                let rad = NODE_RADIUS + (node.pulse>0 ? 3 : 0);
                if(node.pulse>0) node.pulse--;
                ctx.beginPath();
                ctx.arc(node.x, node.y, rad, 0, Math.PI*2);
                let gradNode = ctx.createRadialGradient(node.x-5, node.y-5, 5, node.x, node.y, rad);
                if(node.isWildcard) {
                    gradNode.addColorStop(0, '#dd88ff');
                    gradNode.addColorStop(1, '#9922cc');
                } else {
                    gradNode.addColorStop(0, `hsl(${node.hue}, 80%, 60%)`);
                    gradNode.addColorStop(1, `hsl(${node.hue}, 80%, 30%)`);
                }
                ctx.fillStyle = gradNode;
                ctx.fill();
                ctx.strokeStyle = "#aaffff";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = "white";
                ctx.font = "bold 18px monospace";
                ctx.shadowBlur = 4;
                if(node.isWildcard) ctx.fillText("⚛️", node.x-12, node.y-10);
                else ctx.fillText("◈", node.x-7, node.y-10);
                // connection count
                ctx.font = "bold 12px monospace";
                ctx.fillStyle = "#aaf0ff";
                ctx.fillText(`${node.connections.length}/${MAX_CONNECTIONS}`, node.x-12, node.y+18);
            }
            // dragging preview
            if(dragActive && selectedNode !== null) {
                let from = nodes[selectedNode];
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = "#f0f0ffcc";
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 12, 0, 2*Math.PI);
                ctx.fillStyle = "#ffffff80";
                ctx.fill();
            }
            // display entanglement warning
            if(entanglement > maxEntanglement*0.7) {
                ctx.font = "bold 20px monospace";
                ctx.fillStyle = "#ff7777";
                ctx.shadowBlur = 6;
                ctx.fillText("⚠️ HIGH ENTANGLEMENT", w-200, 45);
            }
            ctx.shadowBlur = 0;
        }
        
        // get node index under point
        function getNodeUnder(px, py) {
            for(let i=0; i<nodes.length; i++) {
                let dx = nodes[i].x - px;
                let dy = nodes[i].y - py;
                if(Math.hypot(dx,dy) < NODE_RADIUS+8) return i;
            }
            return -1;
        }
        
        // event handlers
        function onMouseDown(e) {
            if(!gameActive && knotScore===0) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            let nodeIdx = getNodeUnder(pos.x, pos.y);
            if(nodeIdx !== -1) {
                selectedNode = nodeIdx;
                dragActive = true;
            } else {
                // try to remove edge by click on thread
                let removed = removeEdgeByClick(pos.x, pos.y);
                if(!removed) {
                    // tap on empty: optional wildcard minor effect: but node untangle if double tap? not needed
                    let tappedNode = getNodeUnder(pos.x, pos.y);
                    if(tappedNode !== -1) nodeUntangle(tappedNode);
                }
            }
        }
        
        function onMouseMove(e) {
            if(!dragActive) return;
            const pos = getCanvasCoords(e);
            mouseX = pos.x;
            mouseY = pos.y;
        }
        
        function onMouseUp(e) {
            if(!dragActive || selectedNode === null) {
                dragActive = false;
                selectedNode = null;
                return;
            }
            const pos = getCanvasCoords(e);
            let targetNode = getNodeUnder(pos.x, pos.y);
            if(targetNode !== null && targetNode !== selectedNode && gameActive) {
                addEdge(selectedNode, targetNode);
            }
            dragActive = false;
            selectedNode = null;
        }
        
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(w, Math.max(0, canvasX));
            canvasY = Math.min(h, Math.max(0, canvasY));
            return {x: canvasX, y: canvasY};
        }
        
        function resetGame() {
            initNodes();
            gameActive = true;
            entanglement = 0;
            knotScore = 0;
            selectedNode = null;
            dragActive = false;
            updateUI();
            setMessage("🌀 KNOTMOS REWOVEN! Weave new threads, create loops! 🌀", 100);
        }
        
        function showHelp() {
            setMessage("★ KNOTMOS: Drag between nodes → create Threads. Form ANY closed cycle → unravel Knots & gain points. Wildcard nodes (⚛️) help phase flexibility. Snipe threads by clicking on line. Tap node to untangle smallest cycle. Keep Entanglement low! ★", 280);
        }
        
        // animation loop with entropy
        let lastFrame = 0;
        function animate() {
            entropyShift();
            updateMessage();
            draw();
            requestAnimationFrame(animate);
        }
        
        function attachEvents() {
            canvas.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onMouseDown(e); });
            window.addEventListener('touchmove', (e) => { e.preventDefault(); onMouseMove(e); });
            window.addEventListener('touchend', (e) => { e.preventDefault(); onMouseUp(e); });
            document.getElementById('resetKnot').addEventListener('click', () => resetGame());
            document.getElementById('helpKnot').addEventListener('click', () => showHelp());
        }
        
        initNodes();
        attachEvents();
        animate();
    })();
</script>
</body>
</html>
